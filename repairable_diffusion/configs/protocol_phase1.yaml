paths:
  outputs_root: /home/kimhj/repairable-state-discovery/repairable_diffusion/outputs/runs
  generated_configs_root: /home/kimhj/repairable-state-discovery/results/generated_configs

profiles_path: /home/kimhj/repairable-state-discovery/repairable_diffusion/configs/model_profiles.yaml

dataset:
  name: math500
  path: HuggingFaceH4/MATH-500
  split: test
  limit: 200
  start_index: 0
  sample_seed: 11

protocol:
  run_diffusion_main: true
  run_ar_compare: true

  diffusion_runs:
    - run_name: math500_phase1_llada8b
      model_profile: llada_8b
      config_template: /home/kimhj/repairable-state-discovery/repairable_diffusion/configs/math500_phase1.yaml
    - run_name: math500_phase1_llada8b_fast
      model_profile: llada_8b_fast
      config_template: /home/kimhj/repairable-state-discovery/repairable_diffusion/configs/math500_phase1.yaml
    - run_name: math500_phase1_dream_v0_instruct_7b
      model_profile: dream_v0_instruct_7b
      config_template: /home/kimhj/repairable-state-discovery/repairable_diffusion/configs/math500_phase1.yaml
    - run_name: math500_phase1_dream_v0_base_7b
      model_profile: dream_v0_base_7b
      config_template: /home/kimhj/repairable-state-discovery/repairable_diffusion/configs/math500_phase1.yaml

  ar_runs:
    - run_name: math500_ar_qwen25_7b
      model_profile: qwen2_5_7b_instruct
      samples_per_item: 8
    - run_name: math500_ar_llama31_8b
      model_profile: llama_3_1_8b_instruct
      samples_per_item: 8
